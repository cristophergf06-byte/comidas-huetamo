<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- 🔥 IMPORTANTE PARA CELULAR -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registrar</title>

<link rel="stylesheet" href="style.css">

<!-- 🗺️ LEAFLET MAP -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

</head>

<body>

<div class="registro-container">

<h2>Registrar negocio</h2>

<form id="formRegistro">

<input type="text" id="regNegocio" placeholder="Nombre" required>

<textarea id="regVenta" placeholder="Descripción"></textarea>

<input type="text" id="regTelefono" placeholder="Teléfono">

<input type="text" id="regUbicacion" placeholder="Ubicación">

<input type="text" id="regHorario" placeholder="Horario">

<select id="regTiempo">
<option value="mañana">Mañana</option>
<option value="tarde">Tarde</option>
<option value="noche">Noche</option>
<option value="todos">Todo el día</option>
</select>

<!-- 🗺️ MAPA -->
<div id="map" style="height:300px; border-radius:15px; margin-top:15px;"></div>
<p id="coords">Selecciona ubicación en el mapa</p>

<!-- 🔘 BOTÓN -->
<button type="submit" style="position:relative; z-index:10;">
Registrar
</button>

</form>

</div>

<!-- 🗺️ LEAFLET -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="script.js"></script>

</body>
</html>
