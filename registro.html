<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registrar</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="registro-container">

<h2>Registrar negocio</h2>

<form id="formRegistro">

<input type="text" id="regNegocio" placeholder="Nombre" required>

<!-- 🔥 CAMBIO DE ID -->
<textarea id="regVenta" placeholder="Descripción"></textarea>

<input type="text" id="regTelefono" placeholder="Teléfono">
<input type="text" id="regUbicacion" placeholder="Ubicación">
<input type="text" id="regHorario" placeholder="Horario">

<!-- 🔥 CAMBIO DE ID -->
<select id="regTiempo">
<option value="mañana">Mañana</option>
<option value="tarde">Tarde</option>
<option value="noche">Noche</option>
<option value="todos">Todo el día</option>
</select>

<button type="submit">Registrar</button>

</form>

</div>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="script.js"></script>
</body>
</html>
