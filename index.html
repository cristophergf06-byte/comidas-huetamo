<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comidas Huetamo</title>
<link rel="stylesheet" href="style.css">

<style>
  body {
    margin: 0;
  }

  .banner {
    position: relative;
    width: 100%;
    height: 100vh;
  }

  .banner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .contenido {
    position: absolute;
    bottom: 40px; /* 🔥 ahora siempre queda abajo */
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    width: 100%;
  }

  .btn-main {
    padding: 12px 25px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
  }
</style>
</head>

<body>

<a href="admin-login.html" class="btn-admin">⚙️</a>

<!-- BANNER -->
<div class="banner">
  <img src="img/Huetamo.png" alt="Comida">

  <div class="contenido">
    <button onclick="location.href='buscador.html'" class="btn-main">
      Entrar
    </button>
  </div>
</div>

<a href="registro.html" class="btn-float">+</a>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="script.js"></script>

</body>
</html>
