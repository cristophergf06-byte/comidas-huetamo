<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel de Administración</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="main-container admin-container">

<h2>⚙️ Panel de Administración</h2>

<!-- BUSCADOR -->
<input 
type="text" 
id="adminSearch" 
placeholder="🔍 Buscar negocio..." 
oninput="buscarAdmin()" 
class="admin-search">

<!-- LISTA -->
<div id="admin-lista" class="admin-grid"></div>

</div>

<!-- MODAL EDITAR -->
<div id="modalEdit" class="modal">
<div class="modal-content">

<h3>✏️ Editar negocio</h3>

<input type="text" id="editNombre" placeholder="Nombre">
<textarea id="editDesc" placeholder="Descripción"></textarea>

<input type="text" id="editTelefono" placeholder="Teléfono">
<input type="text" id="editUbicacion" placeholder="Ubicación">
<input type="text" id="editHorario" placeholder="Horario">

<input type="file" id="editImagen">

<div class="modal-btns">
<button class="btn-aprobar" onclick="guardarEdicion()">💾 Guardar</button>
<button class="btn-eliminar" onclick="cerrarModal()">❌ Cancelar</button>
</div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
